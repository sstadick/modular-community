context:
  version: "0.8.0"
  mojo_version: "=0.26.1"

package:
  name: "decimo"
  version: ${{ version }}

source:
  - git: https://github.com/forfudan/decimo.git
    rev: b572a44aa0623f85cc9a7c94d1bef4ffe718f273

build:
  number: 0
  script:
    - mkdir -p ${PREFIX}/lib/mojo
    - mojo package src/decimo -o ${PREFIX}/lib/mojo/decimo.mojopkg

requirements:
  host:
    - mojo-compiler ${{ mojo_version }}
  build:
    - mojo-compiler ${{ mojo_version }}
  run:
    - mojo-compiler ${{ mojo_version }}

about:
  homepage: https://github.com/forfudan/decimo
  license: Apache-2.0
  license_file: LICENSE
  summary: An arbitrary-precision decimal and integer library for Mojo
  repository: https://github.com/forfudan/decimo.git

extra:
  project_name: decimo
  maintainers:
    - forfudan
